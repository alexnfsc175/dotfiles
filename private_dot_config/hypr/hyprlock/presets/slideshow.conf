source = ~/.config/hypr/theme/colors/cat-macchiato.conf

$font = JetBrains Mono Nerd Font 10

general {
    hide_cursor = true
}

# Background: slideshow de wallpapers (troca a cada 10s)
# Wallpapers devem estar em ~/.config/hypr/hyprlock/wallpapers/
# Se o diretório estiver vazio, o fallback é a cor $crust (escura)
background {
    monitor =
    path = $HOME/.config/hypr/hyprlock/wallpapers/default.png
    color = $crust

    reload_cmd = find $HOME/.config/hypr/hyprlock/wallpapers -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.webp' \) 2>/dev/null | shuf -n 1 || echo ""
    reload_time = 10

    blur_size = 4
    blur_passes = 2
    noise = 0.0117
    contrast = 1.2
    brightness = 0.6
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Password Field (todos os monitores)
input-field {
    monitor =
    rounding = 20
    shadow_passes = 2
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.64
    dots_center = true
    inner_color = $surface0
    font_color = $subtext0
    check_color = $yellow
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, 50
    halign = center
    valign = bottom
}

# Current Time (todos os monitores)
label {
    monitor =
    shadow_passes = 1
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = $text
    font_size = 64
    font_family = $font
    position = 0, -35
    halign = center
    valign = center
}

# Current Song (todos os monitores)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/current_song)"
    shadow_passes = 1
    color = $subtext0
    font_size = 17
    font_family = $font
    position = 0, -107
    halign = center
    valign = center
}

# User Image (todos os monitores)
image {
    monitor =
    path = $HOME/.config/hypr/hyprlock/cat.png
    shadow_passes = 2
    rounding = -1 # negative values mean circle
    position = 0, 100
    halign = center
    valign = center
}
